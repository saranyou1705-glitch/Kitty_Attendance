<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06c755">
  <title>Kitty Attendance</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --green:#06c755; --green-dark:#047857; --bg:#f1f5f9; --card:#fff;
      --ink:#0f172a; --muted:#64748b; --border:#dbe3ee; --danger:#dc2626;
      --orange:#ea580c; --blue:#2563eb; --purple:#7c3aed;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select,textarea{font:inherit}.hidden{display:none!important}
    header{padding:calc(18px + env(safe-area-inset-top)) 16px 42px;
      background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff}
    header .wrap,main{max-width:720px;margin:auto}.toprow{display:flex;justify-content:space-between;gap:12px;align-items:center}
    h1{margin:0;font-size:25px}.switcher{display:flex;gap:8px}.switcher button{
      border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.18);color:#fff;
      padding:8px 12px;border-radius:999px;font-weight:800}
    .switcher button.active{background:#fff;color:var(--green-dark)}
    main{margin-top:-26px;padding:0 13px calc(25px + env(safe-area-inset-bottom))}
    .card{background:var(--card);border-radius:20px;padding:17px;margin-bottom:13px;
      box-shadow:0 10px 26px rgba(15,23,42,.09)}
    .status{border:1px solid var(--border);background:#f8fafc;border-radius:13px;padding:12px 13px;font-size:14px}
    .status.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}.status.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}
    .profile{display:grid;grid-template-columns:52px 1fr auto;gap:11px;align-items:center}
    .avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;background:#e2e8f0}
    .name{font-size:18px;font-weight:900}.sub{font-size:13px;color:var(--muted);margin-top:3px}
    .badge{background:var(--blue);color:#fff;font-size:11px;font-weight:900;border-radius:999px;padding:6px 9px}
    .section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .section-head h2{font-size:18px;margin:0}.section-head small{color:var(--muted)}
    .schedule{background:#ecfdf5;color:#065f46;border-radius:13px;padding:12px;line-height:1.55;font-size:14px;margin-bottom:12px}
    .primary-action{width:100%;min-height:62px;border:0;border-radius:16px;color:#fff;font-size:20px;font-weight:900}
    .primary-action:disabled{opacity:.38}.btn-in{background:#16a34a}.btn-breakout{background:var(--orange)}
    .btn-breakin{background:var(--blue)}.btn-out{background:var(--danger)}
    .btn-day{background:#0891b2}.btn-branch{background:var(--purple)}
    .secondary{width:100%;border:1px solid var(--border);background:#fff;border-radius:12px;padding:11px;font-weight:800;margin-top:10px}
    .timeline{display:grid;gap:8px}.event{border:1px solid var(--border);border-radius:12px;padding:11px;display:flex;justify-content:space-between;gap:10px}
    .muted{color:var(--muted)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .metric{border:1px solid var(--border);background:#f8fafc;border-radius:12px;padding:11px}
    .metric b{display:block;font-size:17px;margin-top:4px}.field{display:grid;gap:5px;margin-bottom:10px}
    .field label{font-size:12px;color:var(--muted);font-weight:800}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:11px;padding:10px;background:#fff}
    .admin-tabs{display:flex;gap:7px;overflow:auto;padding-bottom:4px;margin-bottom:12px}.admin-tabs button{
      white-space:nowrap;border:1px solid var(--border);background:#fff;border-radius:999px;padding:8px 11px;font-weight:800}
    .admin-tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
    .table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
    .danger{background:var(--danger)!important;color:#fff!important}.save{background:var(--green-dark)!important;color:#fff!important}
    .row-actions{display:flex;gap:6px;flex-wrap:wrap}.row-actions button{border:0;border-radius:8px;padding:7px 9px;font-weight:800}
    pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:13px;padding:12px;font-size:12px}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="toprow">
      <h1>Kitty Attendance</h1>
      <div id="modeSwitcher" class="switcher hidden">
        <button id="employeeModeBtn" class="active" onclick="setMode('employee')">พนักงาน</button>
        <button id="adminModeBtn" onclick="setMode('admin')">แอดมิน</button>
      </div>
    </div>
  </div>
</header>

<main>
  <section class="card"><div id="appStatus" class="status">กำลังเปิดระบบ…</div></section>

  <section id="profileCard" class="card hidden">
    <div class="profile">
      <img id="avatar" class="avatar" alt="">
      <div><div id="employeeName" class="name">—</div><div id="employeeMeta" class="sub">—</div></div>
      <span id="adminBadge" class="badge hidden">ADMIN</span>
    </div>
  </section>

  <div id="employeeView">
    <section id="clockCard" class="card hidden">
      <div class="section-head"><h2>ลงเวลาวันนี้</h2><small id="todayLabel"></small></div>
      <div id="scheduleBox" class="schedule">กำลังโหลด…</div>
      <button id="nextActionBtn" class="primary-action btn-in" onclick="recordNextAction()">กำลังตรวจสอบ…</button>
      <button class="secondary" onclick="loadToday()">รีเฟรชข้อมูล</button>
    </section>

    <section id="todayEventsCard" class="card hidden">
      <div class="section-head"><h2>รายการวันนี้</h2><small id="eventCount">0 รายการ</small></div>
      <div id="timeline" class="timeline"></div>
    </section>

    <section id="historyCard" class="card hidden">
      <div class="section-head">
        <h2>ประวัติการลงเวลา</h2>
        <input id="historyMonth" type="month" onchange="loadHistory()">
      </div>
      <div id="historyList" class="timeline"></div>
    </section>

    <section id="summaryCard" class="card hidden">
      <div class="section-head"><h2>สรุปวันนี้</h2></div>
      <div id="summaryGrid" class="grid2"></div>
    </section>
  </div>

  <div id="adminView" class="hidden">
    <section class="card">
      <div class="admin-tabs">
        <button class="active" onclick="showAdminTab('daily',this)">รายวัน</button>
        <button onclick="showAdminTab('attendance',this)">แก้เวลา</button>
        <button onclick="showAdminTab('schedule',this)">วันลา/หยุด</button>
        <button onclick="showAdminTab('monthly',this)">Monthly Summary</button>
        <button onclick="showAdminTab('report',this)">LINE Report</button>
      </div>

      <div id="adminDailyTab">
        <div class="field"><label>วันที่</label><input id="adminDate" type="date" onchange="loadAdminDaily()"></div>
        <div id="adminDailyResult" class="status">เลือกวันที่เพื่อโหลดข้อมูล</div>
      </div>

      <div id="adminAttendanceTab" class="hidden">
        <div class="field"><label>พนักงาน</label><select id="attendanceEmployee"></select></div>
        <div class="field"><label>วันที่</label><input id="attendanceDate" type="date"></div>
        <button class="secondary" onclick="loadAdminEmployeeDay()">โหลดรายการลงเวลา</button>
        <div id="attendanceEditor" style="margin-top:12px"></div>

        <hr style="border:0;border-top:1px solid var(--border);margin:16px 0">
        <h3>เพิ่มการลงเวลา</h3>
        <div class="grid2">
          <div class="field"><label>ประเภท</label>
            <select id="newEventType">
              <option>IN</option><option>BREAK_OUT</option><option>BREAK_IN</option><option>OUT</option>
              <option>DAY_IN</option><option>BRANCH_IN</option><option>BRANCH_OUT</option><option>DAY_OUT</option>
            </select>
          </div>
          <div class="field"><label>วันและเวลา</label><input id="newEventAt" type="datetime-local"></div>
        </div>
        <div class="field"><label>เหตุผล</label><textarea id="newEventReason"></textarea></div>
        <button class="secondary save" onclick="adminAddEvent()">เพิ่มและคำนวณใหม่</button>
      </div>

      <div id="adminScheduleTab" class="hidden">
        <div class="field"><label>พนักงาน</label><select id="scheduleEmployee"></select></div>
        <div class="field"><label>วันที่</label><input id="scheduleDate" type="date"></div>
        <div class="field"><label>สถานะ</label>
          <select id="scheduleStatus">
            <option value="WORK">ทำงาน</option><option value="OFF">วันหยุด</option><option value="WFH">WFH</option>
            <option value="SICK_LEAVE">ลาป่วย</option><option value="BUSINESS_LEAVE">ลากิจ</option>
            <option value="VACATION">ลาพักร้อน</option><option value="UNPAID_LEAVE">ลาไม่รับค่าจ้าง</option>
            <option value="HOLIDAY">วันหยุดนักขัตฤกษ์</option>
          </select>
        </div>
        <div class="field"><label>เหตุผล</label><textarea id="scheduleReason"></textarea></div>
        <button class="secondary save" onclick="adminSaveSchedule()">บันทึกและคำนวณใหม่</button>
      </div>


      <div id="adminMonthlyTab" class="hidden">
        <div class="field">
          <label>เดือน</label>
          <input id="monthlySummaryMonth" type="month">
        </div>
        <button class="secondary" onclick="loadMonthlySummary()">โหลด Monthly Summary</button>
        <div id="monthlySummaryResult" style="margin-top:12px"></div>
      </div>

      <div id="adminReportTab" class="hidden">
        <div class="field"><label>วันที่รายงาน</label><input id="reportDate" type="date"></div>
        <div class="field">
          <label>ประเภทรายงาน</label>
          <select id="reportType">
            <option value="MIDDAY">รายงาน 13:00</option>
            <option value="END_DAY">รายงาน 22:00</option>
          </select>
        </div>
        <div class="row-actions">
          <button class="secondary" onclick="previewLineReport()">ดูตัวอย่างรายงาน</button>
          <button class="secondary save" onclick="sendLineReport()">ส่ง LINE Report</button>
        </div>
        <pre id="reportPreview">ยังไม่ได้สร้างรายงาน</pre>
        <div class="status">การส่งตามเวลายังคงทำงานผ่าน Scheduled Trigger/Cron โดยเรียก endpoint เดียวกับปุ่มส่งนี้</div>
      </div>
    </section>
  </div>
</main>

<script>
"use strict";
const CONFIG = {
  LIFF_ID:"2010336238-Ub6d565R",
  API_URL:"https://rlqecfzddxpywbbbiirg.supabase.co/functions/v1/rapid-processor",
  TIMEOUT:15000
};
const LABELS={IN:"เข้างาน",BREAK_OUT:"ออกพัก",BREAK_IN:"กลับจากพัก",OUT:"ออกงาน",
 DAY_IN:"เริ่มวัน",BRANCH_IN:"เข้าสาขา",BRANCH_OUT:"ออกจากสาขา",DAY_OUT:"จบวัน"};
let boot=null,today=null,nextAction=null,saving=false,employees=[];

document.addEventListener("DOMContentLoaded",init);

async function init(){
 try{
  setStatus("กำลังเชื่อมต่อ LINE…");
  await liff.init({liffId:CONFIG.LIFF_ID});
  if(!liff.isInClient()) throw new Error("กรุณาเปิดระบบจากในแอป LINE");
  if(!liff.isLoggedIn()){liff.login();return}
  boot=await api("bootstrap");
  if(!boot.employee) throw new Error("EMPLOYEE_NOT_REGISTERED");
  renderProfile();
  ["clockCard","todayEventsCard","historyCard","summaryCard"].forEach(id=>document.getElementById(id).classList.remove("hidden"));
  if(boot.isAdmin){
    document.getElementById("modeSwitcher").classList.remove("hidden");
    document.getElementById("adminBadge").classList.remove("hidden");
    await loadAdminBootstrap();
  }
  const d=bkkDate(); document.getElementById("historyMonth").value=d.slice(0,7);
  ["adminDate","attendanceDate","scheduleDate","reportDate"].forEach(id=>{const e=document.getElementById(id);if(e)e.value=d});
  document.getElementById("monthlySummaryMonth").value=d.slice(0,7);
  await loadToday(); await loadHistory(); setStatus("พร้อมใช้งาน","ok");
 }catch(e){setStatus(errText(e),"err");console.error(e)}
}

async function api(action,payload={}){
 const token=liff.getAccessToken(); if(!token) throw new Error("MISSING_LINE_TOKEN");
 const c=new AbortController(),t=setTimeout(()=>c.abort(),CONFIG.TIMEOUT);
 try{
  const r=await fetch(`${CONFIG.API_URL}?action=${encodeURIComponent(action)}`,{
   method:"POST",headers:{"Content-Type":"application/json","x-line-access-token":token},
   body:JSON.stringify(payload),signal:c.signal
  });
  const x=await r.json(); if(!r.ok||!x.ok) throw new Error(x.error||`HTTP ${r.status}`); return x;
 }finally{clearTimeout(t)}
}

function setMode(mode){
 const admin=mode==="admin";
 document.getElementById("employeeView").classList.toggle("hidden",admin);
 document.getElementById("adminView").classList.toggle("hidden",!admin);
 document.getElementById("employeeModeBtn").classList.toggle("active",!admin);
 document.getElementById("adminModeBtn").classList.toggle("active",admin);
 if(admin) loadAdminDaily();
}

function renderProfile(){
 const p=boot.profile||{},e=boot.employee;
 document.getElementById("profileCard").classList.remove("hidden");
 document.getElementById("avatar").src=p.pictureUrl||"";
 document.getElementById("employeeName").textContent=e.name;
 document.getElementById("employeeMeta").textContent=`${e.employee_code} • ${e.attendance_mode}`;
}

async function loadToday(){
 const r=await api("today",{date:bkkDate()}); today=r; renderToday(); determineNextAction();
}

function renderToday(){
 const s=today.schedule,ev=today.events||[],d=today.daily;
 document.getElementById("todayLabel").textContent=thaiDate(bkkDate());
 document.getElementById("scheduleBox").innerHTML=s?
  `<b>${esc(s.schedule_status)}</b><br>${esc(s.shift?.name||"ไม่ระบุกะ")} • ${esc(s.office?.name||"ไม่ระบุสถานที่")}`:
  "<b>ไม่พบตารางงานวันนี้</b>";
 document.getElementById("eventCount").textContent=`${ev.length} รายการ`;
 document.getElementById("timeline").innerHTML=ev.length?ev.map(x=>`<div class="event"><b>${esc(LABELS[x.event_type]||x.event_type)}</b><span class="muted">${timeTH(x.event_at)}</span></div>`).join(""):'<div class="status">ยังไม่มีรายการ</div>';
 const m=[["สถานะ",d?.work_status||"—"],["ทำงาน",hours(d?.paid_work_hours)],["ขาด",hours(d?.short_hours)],["เกิน",hours(d?.over_hours)],["ชดเชย",hours(d?.makeup_hours)],["สุทธิ",hours(d?.net_hours)]];
 document.getElementById("summaryGrid").innerHTML=m.map(([a,b])=>`<div class="metric"><span class="muted">${a}</span><b>${esc(b)}</b></div>`).join("");
}

function determineNextAction(){
 const mode=boot.employee.attendance_mode||"STANDARD", types=(today.events||[]).map(x=>x.event_type), st=today.schedule?.schedule_status;
 const noClock=["WFH","SICK_LEAVE","BUSINESS_LEAVE","VACATION","HOLIDAY","UNPAID_LEAVE"].includes(st);
 if(noClock){setNext(null,st);return}
 if(mode==="MULTI_BRANCH"){
  // DAY_IN -> BRANCH_IN -> optional BREAK_OUT -> BREAK_IN -> BRANCH_OUT -> next BRANCH_IN or DAY_OUT.
  if(!types.includes("DAY_IN")) return setNext("DAY_IN","เริ่มวันทำงาน");
  const last=types[types.length-1];
  if(last==="DAY_IN"||last==="BRANCH_OUT") return setNext("BRANCH_IN","เข้าสาขา");
  if(last==="BRANCH_IN"||last==="BREAK_IN") return setNext("BRANCH_OUT","ออกจากสาขา");
  if(last==="BREAK_OUT") return setNext("BREAK_IN","กลับจากพัก");
  if(last==="DAY_OUT") return setNext(null,"ลงเวลาครบแล้ว");
  return setNext("DAY_OUT","จบวันทำงาน");
 }
 if(!types.includes("IN")) return setNext("IN","เข้างาน");
 if(!types.includes("BREAK_OUT")&&!types.includes("OUT")) return setNext("BREAK_OUT","ออกพัก");
 if(types.includes("BREAK_OUT")&&!types.includes("BREAK_IN")) return setNext("BREAK_IN","กลับจากพัก");
 if(!types.includes("OUT")) return setNext("OUT","ออกงาน");
 setNext(null,"ลงเวลาครบแล้ว");
}

function setNext(type,label){
 nextAction=type; const b=document.getElementById("nextActionBtn"); b.disabled=!type;b.textContent=label;
 b.className="primary-action "+({IN:"btn-in",BREAK_OUT:"btn-breakout",BREAK_IN:"btn-breakin",OUT:"btn-out",DAY_IN:"btn-day",DAY_OUT:"btn-day",BRANCH_IN:"btn-branch",BRANCH_OUT:"btn-branch"}[type]||"btn-in");
}

async function recordNextAction(){
 if(!nextAction||saving)return;saving=true;const b=document.getElementById("nextActionBtn");b.disabled=true;
 try{
  setStatus("กำลังบันทึก…"); const pos=await geo();
  await api("record",{eventType:nextAction,eventAt:new Date().toISOString(),workDate:bkkDate(),
   latitude:pos.coords.latitude,longitude:pos.coords.longitude,gpsAccuracy:pos.coords.accuracy,
   officeId:today.schedule?.office_id||null,officeName:today.schedule?.office?.name||null});
  await loadToday(); await loadHistory(); setStatus("บันทึกสำเร็จ","ok");
 }catch(e){setStatus(errText(e),"err")}finally{saving=false;determineNextAction()}
}

async function loadHistory(){
 const month=document.getElementById("historyMonth").value||bkkDate().slice(0,7),box=document.getElementById("historyList");
 try{
  const r=await api("employee_month",{month});
  const rows=(r.rows||[]).filter(x => x.first_in_at || x.last_out_at || Number(x.paid_work_hours||0) > 0);
  box.innerHTML=rows.length?rows.map(x=>`<div class="event" style="display:block">
   <div style="display:flex;justify-content:space-between"><b>${thaiDate(x.work_date)}</b><span class="muted">${esc(x.work_status||x.schedule_status||"—")}</span></div>
   <div class="muted" style="margin-top:6px">เข้า ${timeTH(x.first_in_at)} • ออก ${timeTH(x.last_out_at)}<br>ทำงาน ${hours(x.paid_work_hours)} • ขาด ${hours(x.short_hours)} • เกิน ${hours(x.over_hours)}</div>
  </div>`).join(""):'<div class="status">ไม่พบข้อมูล</div>';
 }catch(e){box.innerHTML=`<div class="status err">${esc(errText(e))}</div>`}
}

async function loadAdminBootstrap(){
 const r=await api("admin_bootstrap"); employees=r.employees||[];
 const opts=employees.map(e=>`<option value="${e.id}">${esc(e.employee_code)} - ${esc(e.name)}</option>`).join("");
 document.getElementById("attendanceEmployee").innerHTML=opts;
 document.getElementById("scheduleEmployee").innerHTML=opts;
}

function showAdminTab(name,btn){
 ["daily","attendance","schedule","monthly","report"].forEach(x=>document.getElementById("admin"+cap(x)+"Tab").classList.toggle("hidden",x!==name));
 document.querySelectorAll(".admin-tabs button").forEach(x=>x.classList.remove("active"));btn.classList.add("active");
}

async function loadAdminDaily(){
 const box=document.getElementById("adminDailyResult");
 try{
  const r=await api("admin_daily",{date:document.getElementById("adminDate").value});
  const rows=r.rows||[]; box.className=""; box.innerHTML=rows.length?`<table class="table"><thead><tr><th>พนักงาน</th><th>สถานะ</th><th>เข้า</th><th>ออก</th><th>ทำงาน</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${esc(x.employee.employee_code)}<br>${esc(x.employee.name)}</td><td>${esc(x.work_status||x.schedule_status)}</td><td>${timeTH(x.first_in_at)}</td><td>${timeTH(x.last_out_at)}</td><td>${hours(x.paid_work_hours)}</td></tr>`).join("")}</tbody></table>`:'<div class="status">ไม่พบข้อมูล</div>';
 }catch(e){box.className="status err";box.textContent=errText(e)}
}

async function loadAdminEmployeeDay(){
 const r=await api("admin_employee_day",{employeeId:document.getElementById("attendanceEmployee").value,date:document.getElementById("attendanceDate").value});
 const box=document.getElementById("attendanceEditor"),rows=r.events||[];
 box.innerHTML=rows.length?rows.map(x=>`<div class="event" style="display:block">
  <div><b>${esc(x.event_type)}</b> ${timeTH(x.event_at)}</div>
  <div class="row-actions" style="margin-top:8px">
   <button onclick="adminEditEvent('${x.id}','${x.event_at}')">แก้เวลา</button>
   <button class="danger" onclick="adminDeleteEvent('${x.id}')">ลบ</button>
  </div></div>`).join(""):'<div class="status">ไม่พบรายการ</div>';
}

async function adminEditEvent(id,current){
 const defaultValue=toBangkokLocalInput(current);
 const v=prompt("กรอกวันเวลาไทย รูปแบบ YYYY-MM-DDTHH:mm",defaultValue);
 if(!v)return;
 const reason=prompt("เหตุผลในการแก้ไข"); if(!reason)return;
 const eventAt=bangkokLocalToIso(v);
 await api("admin_update_event",{eventId:id,eventAt,reason});
 await loadAdminEmployeeDay(); await loadAdminDaily();
}

async function adminDeleteEvent(id){
 const reason=prompt("เหตุผลในการลบ"); if(!reason)return;
 await api("admin_delete_event",{eventId:id,reason}); await loadAdminEmployeeDay(); await loadAdminDaily();
}

async function adminAddEvent(){
 const reason=document.getElementById("newEventReason").value.trim(); if(!reason)return alert("กรุณากรอกเหตุผล");
 await api("admin_add_event",{employeeId:document.getElementById("attendanceEmployee").value,eventType:document.getElementById("newEventType").value,eventAt:bangkokLocalToIso(document.getElementById("newEventAt").value),reason});
 await loadAdminEmployeeDay();await loadAdminDaily();alert("เพิ่มและคำนวณใหม่แล้ว");
}

async function adminSaveSchedule(){
 const reason=document.getElementById("scheduleReason").value.trim();if(!reason)return alert("กรุณากรอกเหตุผล");
 await api("admin_update_schedule",{employeeId:document.getElementById("scheduleEmployee").value,workDate:document.getElementById("scheduleDate").value,scheduleStatus:document.getElementById("scheduleStatus").value,reason});
 await loadAdminDaily();alert("บันทึกและคำนวณใหม่แล้ว");
}


async function loadMonthlySummary(){
 const month=document.getElementById("monthlySummaryMonth").value;
 const box=document.getElementById("monthlySummaryResult");
 try{
  box.innerHTML='<div class="status">กำลังโหลด…</div>';
  const r=await api("admin_monthly_summary",{month});
  const rows=r.rows||[];
  box.innerHTML=rows.length?`<table class="table">
   <thead><tr>
    <th>พนักงาน</th><th>วันทำงาน</th><th>ชั่วโมงทำงาน</th>
    <th>ขาด</th><th>เกิน</th><th>ชดเชย</th><th>สุทธิ</th>
   </tr></thead>
   <tbody>${rows.map(x=>`<tr>
    <td>${esc(x.employee_code)}<br>${esc(x.name)}</td>
    <td>${x.work_days}</td>
    <td>${hours(x.paid_work_hours)}</td>
    <td>${hours(x.short_hours)}</td>
    <td>${hours(x.over_hours)}</td>
    <td>${hours(x.makeup_hours)}</td>
    <td>${hours(x.net_hours)}</td>
   </tr>`).join("")}</tbody></table>`:'<div class="status">ไม่พบข้อมูล</div>';
 }catch(e){box.innerHTML=`<div class="status err">${esc(errText(e))}</div>`}
}

async function previewLineReport() {
  const r = await api("admin_report_preview", {
    date: document.getElementById("reportDate").value,
    reportType: document.getElementById("reportType").value
  });

  document.getElementById("reportPreview").textContent =
    r.message || "";
}
async function sendLineReport() {
  const reportType = document.getElementById("reportType").value;
  const label = reportType === "MIDDAY"
    ? "รายงาน 13:00"
    : "รายงาน 22:00";

  if (!confirm(`ยืนยันส่ง ${label}`)) return;

  const r = await api("admin_report_send", {
    date: document.getElementById("reportDate").value,
    reportType
  });

  document.getElementById("reportPreview").textContent =
    r.message || "ส่งสำเร็จ";

  alert(`ส่ง ${label} แล้ว`);
}


function toBangkokLocalInput(value){
 if(!value)return "";
 const d=new Date(value);
 const parts=new Intl.DateTimeFormat("en-CA",{
  timeZone:"Asia/Bangkok",year:"numeric",month:"2-digit",day:"2-digit",
  hour:"2-digit",minute:"2-digit",hour12:false
 }).formatToParts(d);
 const v=Object.fromEntries(parts.map(p=>[p.type,p.value]));
 return `${v.year}-${v.month}-${v.day}T${v.hour}:${v.minute}`;
}
function bangkokLocalToIso(value){
 if(!value)throw new Error("กรุณากรอกวันและเวลา");
 return new Date(`${value}:00+07:00`).toISOString();
}

function geo(){return new Promise((ok,no)=>navigator.geolocation.getCurrentPosition(ok,e=>no(new Error("ไม่สามารถอ่าน GPS ได้")),{enableHighAccuracy:true,timeout:12000,maximumAge:0}))}
function setStatus(m,t=""){const e=document.getElementById("appStatus");e.textContent=m;e.className="status "+t}
function bkkDate(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date())}
function thaiDate(v){if(!v)return"—";return new Intl.DateTimeFormat("th-TH",{day:"numeric",month:"short",year:"numeric"}).format(new Date(v+"T00:00:00+07:00"))}
function timeTH(v){if(!v)return"—";return new Intl.DateTimeFormat("th-TH",{timeZone:"Asia/Bangkok",hour:"2-digit",minute:"2-digit"}).format(new Date(v))}
function hours(v){const n=Number(v);if(!Number.isFinite(n))return"—";const m=Math.round(Math.abs(n)*60),h=Math.floor(m/60),r=m%60,p=n<0?"-":"";return h?(r?`${p}${h} ชม. ${r} นาที`:`${p}${h} ชม.`):`${p}${r} นาที`}
function cap(x){return x[0].toUpperCase()+x.slice(1)}
function esc(x){return String(x??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function errText(e){const x=String(e?.message||e);return({MISSING_LINE_TOKEN:"ไม่พบ LINE Token",INVALID_LINE_TOKEN:"LINE Token ไม่ถูกต้อง",EMPLOYEE_NOT_REGISTERED:"ไม่พบข้อมูลพนักงาน",ADMIN_REQUIRED:"ไม่มีสิทธิ์แอดมิน",REASON_REQUIRED:"ต้องกรอกเหตุผล",LINE_CHANNEL_TOKEN_MISSING:"ยังไม่ได้ตั้ง LINE_CHANNEL_ACCESS_TOKEN"}[x]||x)}
</script>
